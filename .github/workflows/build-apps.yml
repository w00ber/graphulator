name: Build Standalone Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version to use'
        required: false
        default: '3.11'
        type: choice
        options:
          - '3.10'
          - '3.11'
          - '3.12'

permissions:
  contents: write

env:
  PYTHON_VERSION: ${{ inputs.python_version || '3.11' }}

jobs:
  # Create the draft release exactly once per tag push, before any build job
  # starts uploading to it. The build jobs only ever call `gh release upload`,
  # never `gh release create`, so we avoid the draft-proliferation bug where
  # parallel `gh release create --draft` calls each produce a fresh draft
  # (drafts don't have a realized tag ref, so `gh release create` can't find
  # and reuse an existing draft by tag name).
  prepare-release:
    name: Prepare draft release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create draft release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXISTING=$(gh api "/repos/$GITHUB_REPOSITORY/releases" \
            --jq ".[] | select(.tag_name == \"$TAG\" and .draft == true) | .id" \
            | head -1)
          if [ -n "$EXISTING" ]; then
            echo "Reusing existing draft release (id=$EXISTING) for $TAG"
          else
            echo "Creating new draft release for $TAG"
            gh release create "$TAG" \
              --draft \
              --generate-notes \
              --title "$TAG" \
              --repo "$GITHUB_REPOSITORY"
          fi

  build-graphulator-windows:
    name: Build graphulator (Windows)
    needs: [prepare-release]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UPX
        shell: bash
        run: choco install upx -y

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build with PyInstaller
        working-directory: building
        run: python -m PyInstaller graphulator.spec --noconfirm --clean

      - name: List build output
        working-directory: building
        shell: bash
        run: ls -la dist*/ || echo "No dist directories found"; find . -name "graphulator.exe" -type f 2>/dev/null || true

      - name: Post-build cleanup
        working-directory: building
        shell: bash
        run: |
          DIST_DIR=$(find . -name "graphulator.exe" -type f -print -quit | xargs dirname)
          echo "Cleaning: $DIST_DIR"
          if [ -n "$DIST_DIR" ]; then
            # Remove unused Qt plugins
            for dir in sqldrivers virtualkeyboard position sensors texttospeech multimedia qmltooling; do
              rm -rf "$DIST_DIR/PySide6/plugins/$dir" 2>/dev/null || true
            done
            # Remove Qt translation files
            rm -rf "$DIST_DIR/PySide6/translations" 2>/dev/null || true
            # Remove unused Qt DLLs
            for dll in Qt6Charts Qt6DataVisualization Qt6Quick Qt6Qml Qt6Quick3D Qt6ShaderTools \
                       Qt6Multimedia Qt6Sensors Qt6Bluetooth Qt6Nfc Qt6SerialPort Qt6Test \
                       Qt6VirtualKeyboard Qt6RemoteObjects Qt6Sql; do
              rm -f "$DIST_DIR/PySide6/${dll}.dll" 2>/dev/null || true
              rm -f "$DIST_DIR/PySide6/${dll}d.dll" 2>/dev/null || true
            done
            # Report size
            echo "Size after cleanup:"
            du -sh "$DIST_DIR" || true
          fi

      - name: Compress with UPX
        working-directory: building
        shell: bash
        run: |
          DIST_DIR=$(find . -name "graphulator.exe" -type f -print -quit | xargs dirname)
          if [ -n "$DIST_DIR" ]; then
            echo "Running UPX on binaries..."
            find "$DIST_DIR" \( -name "*.dll" -o -name "*.pyd" \) \
              ! -name "Qt*WebEngine*" ! -name "python*.dll" \
              -exec upx --best --lzma {} + 2>/dev/null || true
            upx --best --lzma "$DIST_DIR/graphulator.exe" 2>/dev/null || true
            echo "Size after UPX:"
            du -sh "$DIST_DIR" || true
          fi

      - name: Zip artifact
        shell: bash
        working-directory: building
        run: |
          DIST_DIR=$(find . -name "graphulator.exe" -type f -print -quit | xargs dirname)
          echo "Found exe in: $DIST_DIR"
          7z a -mx=9 graphulator-windows.zip "$DIST_DIR/*"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        working-directory: building
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" graphulator-windows.zip --clobber --repo "$GITHUB_REPOSITORY"

  build-graphulator-macos:
    name: Build graphulator (macOS)
    needs: [prepare-release]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build with PyInstaller
        working-directory: building
        run: python -m PyInstaller graphulator.spec --noconfirm --clean

      - name: List build output
        working-directory: building
        run: ls -la dist*/ || echo "No dist directories found"; find . -name "graphulator.app" -maxdepth 3 -type d 2>/dev/null || true

      - name: Post-build cleanup
        working-directory: building
        run: |
          APP_DIR=$(find . -name "graphulator.app" -maxdepth 3 -type d | head -1)
          if [ -n "$APP_DIR" ]; then
            echo "Cleaning: $APP_DIR"

            # Remove Qt translation files
            find "$APP_DIR" -path "*/translations" -type d -exec rm -rf {} + 2>/dev/null || true

            # Remove unused Qt plugins
            for dir in sqldrivers virtualkeyboard position sensors texttospeech multimedia qmltooling; do
              find "$APP_DIR" -path "*/$dir" -type d -exec rm -rf {} + 2>/dev/null || true
            done

            # Strip debug symbols from all binaries
            find "$APP_DIR" -type f \( -name "*.so" -o -name "*.dylib" \) -exec strip -x {} + 2>/dev/null || true

            # Re-sign
            codesign --force --deep --sign - "$APP_DIR" 2>/dev/null || true

            echo "Size after cleanup:"
            du -sh "$APP_DIR" || true
          fi

      - name: Zip app bundle
        working-directory: building
        run: |
          APP_PATH=$(find . -name "graphulator.app" -maxdepth 3 -type d | head -1)
          echo "Found app at: $APP_PATH"
          APP_DIR=$(dirname "$APP_PATH")
          cd "$APP_DIR"
          zip -9 -r --symlinks "$GITHUB_WORKSPACE/graphulator-macos.zip" graphulator.app

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" graphulator-macos.zip --clobber --repo "$GITHUB_REPOSITORY"

  build-paragraphulator-windows:
    name: Build paragraphulator (Windows)
    needs: [prepare-release]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UPX
        shell: bash
        run: choco install upx -y

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .
          pip install certifi markdown

      - name: Build with PyInstaller
        working-directory: building
        run: python -m PyInstaller paragraphulator.spec --noconfirm --clean

      - name: List build output
        working-directory: building
        shell: bash
        run: ls -la dist*/ || echo "No dist directories found"; find . -name "paragraphulator.exe" -type f 2>/dev/null || true

      - name: Post-build cleanup
        working-directory: building
        shell: bash
        run: |
          DIST_DIR=$(find . -name "paragraphulator.exe" -type f -print -quit | xargs dirname)
          echo "Cleaning: $DIST_DIR"
          if [ -n "$DIST_DIR" ]; then
            # Remove unused Qt plugins
            for dir in sqldrivers virtualkeyboard position sensors texttospeech multimedia qmltooling; do
              rm -rf "$DIST_DIR/PySide6/plugins/$dir" 2>/dev/null || true
            done
            # Remove non-English Qt translations
            find "$DIST_DIR" -path "*/translations" -type d | while read tdir; do
              find "$tdir" -name "*.qm" ! -name "qt_en*" ! -name "qtbase_en*" -delete 2>/dev/null || true
            done
            # Remove non-English QtWebEngine locales
            find "$DIST_DIR" -path "*/qtwebengine_locales" -type d | while read ldir; do
              find "$ldir" -name "*.pak" ! -name "en-US.pak" ! -name "en-GB.pak" -delete 2>/dev/null || true
            done
            # Remove unused Qt DLLs
            for dll in Qt6Charts Qt6DataVisualization Qt6Quick3D Qt6ShaderTools \
                       Qt6Sensors Qt6Bluetooth Qt6Nfc Qt6SerialPort Qt6Test \
                       Qt6VirtualKeyboard Qt6RemoteObjects Qt6Sql; do
              rm -f "$DIST_DIR/PySide6/${dll}.dll" 2>/dev/null || true
              rm -f "$DIST_DIR/PySide6/${dll}d.dll" 2>/dev/null || true
            done
            echo "Size after cleanup:"
            du -sh "$DIST_DIR" || true
          fi

      - name: Compress with UPX
        working-directory: building
        shell: bash
        run: |
          DIST_DIR=$(find . -name "paragraphulator.exe" -type f -print -quit | xargs dirname)
          if [ -n "$DIST_DIR" ]; then
            echo "Running UPX on binaries..."
            find "$DIST_DIR" \( -name "*.dll" -o -name "*.pyd" \) \
              ! -name "Qt*WebEngine*" ! -name "python*.dll" ! -name "d3dcompiler*" \
              -exec upx --best --lzma {} + 2>/dev/null || true
            upx --best --lzma "$DIST_DIR/paragraphulator.exe" 2>/dev/null || true
            echo "Size after UPX:"
            du -sh "$DIST_DIR" || true
          fi

      - name: Zip artifact
        shell: bash
        working-directory: building
        run: |
          DIST_DIR=$(find . -name "paragraphulator.exe" -type f -print -quit | xargs dirname)
          echo "Found exe in: $DIST_DIR"
          7z a -mx=9 paragraphulator-windows.zip "$DIST_DIR/*"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        working-directory: building
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" paragraphulator-windows.zip --clobber --repo "$GITHUB_REPOSITORY"

  build-paragraphulator-macos:
    name: Build paragraphulator (macOS)
    needs: [prepare-release]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .
          pip install certifi markdown

      - name: Build with PyInstaller
        working-directory: building
        run: python -m PyInstaller paragraphulator.spec --noconfirm --clean

      - name: List build output
        working-directory: building
        run: ls -la dist*/ || echo "No dist directories found"; find . -name "paragraphulator.app" -maxdepth 3 -type d 2>/dev/null || true

      - name: Post-build optimization
        working-directory: building
        run: |
          APP_DIR=$(find . -name "paragraphulator.app" -maxdepth 3 -type d | head -1)
          if [ -n "$APP_DIR" ]; then
            echo "Optimizing: $APP_DIR"

            # Remove Qt translation files (~5MB savings)
            rm -rf "$APP_DIR/Contents/Frameworks/PySide6/Qt/translations" 2>/dev/null || true
            rm -rf "$APP_DIR/Contents/Resources/PySide6/Qt/translations" 2>/dev/null || true
            find "$APP_DIR" -path "*/translations" -type d -exec rm -rf {} + 2>/dev/null || true

            # Remove non-English QtWebEngine locales (~20MB savings)
            find "$APP_DIR" -path "*/qtwebengine_locales" -type d | while read ldir; do
              find "$ldir" -name "*.pak" ! -name "en-US.pak" ! -name "en-GB.pak" -delete 2>/dev/null || true
            done

            # Remove unused Qt plugins
            for dir in sqldrivers virtualkeyboard position sensors texttospeech multimedia qmltooling; do
              find "$APP_DIR" -path "*/$dir" -type d -exec rm -rf {} + 2>/dev/null || true
            done

            # Strip debug symbols from all binaries
            find "$APP_DIR" -type f \( -name "*.so" -o -name "*.dylib" \) -exec strip -x {} + 2>/dev/null || true

            # Re-sign after modifications
            codesign --force --deep --sign - "$APP_DIR" 2>/dev/null || true

            echo "Size after optimization:"
            du -sh "$APP_DIR" || true
          else
            echo "WARNING: paragraphulator.app not found"
          fi

      - name: Zip app bundle
        working-directory: building
        run: |
          APP_PATH=$(find . -name "paragraphulator.app" -maxdepth 3 -type d | head -1)
          echo "Found app at: $APP_PATH"
          APP_DIR=$(dirname "$APP_PATH")
          cd "$APP_DIR"
          zip -9 -r --symlinks "$GITHUB_WORKSPACE/paragraphulator-macos.zip" paragraphulator.app

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" paragraphulator-macos.zip --clobber --repo "$GITHUB_REPOSITORY"
