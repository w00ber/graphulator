name: Build Standalone Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version to use'
        required: false
        default: '3.11'
        type: choice
        options:
          - '3.10'
          - '3.11'
          - '3.12'

permissions:
  contents: write

env:
  PYTHON_VERSION: ${{ inputs.python_version || '3.11' }}

jobs:
  build-graphulator-windows:
    name: Build graphulator (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build with PyInstaller
        working-directory: building
        run: python -m PyInstaller graphulator-win.spec --noconfirm --clean

      - name: List build output
        working-directory: building
        shell: bash
        run: ls -la dist*/ || echo "No dist directories found"; find . -name "graphulator.exe" -type f 2>/dev/null || true

      - name: Zip artifact
        shell: pwsh
        working-directory: building
        run: |
          $exeDir = Get-ChildItem -Recurse -Filter "graphulator.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $distDir = $exeDir.DirectoryName
          Write-Host "Found exe at: $distDir"
          Compress-Archive -Path "$distDir\*" -DestinationPath graphulator-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: graphulator-windows
          path: building/graphulator-windows.zip

  build-graphulator-macos:
    name: Build graphulator (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build with PyInstaller
        working-directory: building
        run: python -m PyInstaller graphulator-mac.spec --noconfirm --clean

      - name: List build output
        working-directory: building
        run: ls -la dist*/ || echo "No dist directories found"; find . -name "graphulator.app" -maxdepth 3 -type d 2>/dev/null || true

      - name: Zip app bundle
        working-directory: building
        run: |
          APP_PATH=$(find . -name "graphulator.app" -maxdepth 3 -type d | head -1)
          echo "Found app at: $APP_PATH"
          APP_DIR=$(dirname "$APP_PATH")
          cd "$APP_DIR"
          zip -r "$GITHUB_WORKSPACE/graphulator-macos.zip" graphulator.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: graphulator-macos
          path: graphulator-macos.zip

  build-paragraphulator-windows:
    name: Build paragraphulator (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .
          pip install certifi markdown

      - name: Build with PyInstaller
        working-directory: building
        run: python -m PyInstaller paragraphulator-win.spec --noconfirm --clean

      - name: List build output
        working-directory: building
        shell: bash
        run: ls -la dist*/ || echo "No dist directories found"; find . -name "paragraphulator.exe" -type f 2>/dev/null || true

      - name: Zip artifact
        shell: pwsh
        working-directory: building
        run: |
          $exeDir = Get-ChildItem -Recurse -Filter "paragraphulator.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $distDir = $exeDir.DirectoryName
          Write-Host "Found exe at: $distDir"
          Compress-Archive -Path "$distDir\*" -DestinationPath paragraphulator-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: paragraphulator-windows
          path: building/paragraphulator-windows.zip

  build-paragraphulator-macos:
    name: Build paragraphulator (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .
          pip install certifi markdown

      - name: Build with PyInstaller
        working-directory: building
        run: python -m PyInstaller paragraphulator-mac.spec --noconfirm --clean

      - name: List build output
        working-directory: building
        run: ls -la dist*/ || echo "No dist directories found"; find . -name "paragraphulator.app" -maxdepth 3 -type d 2>/dev/null || true

      - name: Post-build optimization
        working-directory: building
        run: |
          APP_DIR=$(find . -name "paragraphulator.app" -maxdepth 3 -type d | head -1)
          if [ -n "$APP_DIR" ]; then
            echo "Optimizing: $APP_DIR"

            # Remove Qt translation files (~5MB savings)
            rm -rf "$APP_DIR/Contents/Frameworks/PySide6/Qt/translations" 2>/dev/null || true
            rm -rf "$APP_DIR/Contents/Resources/PySide6/Qt/translations" 2>/dev/null || true

            # Remove non-English QtWebEngine locales (~20MB savings)
            LOCALES_DIR="$APP_DIR/Contents/Frameworks/PySide6/Qt/lib/QtWebEngineCore.framework/Versions/A/Resources/qtwebengine_locales"
            if [ -d "$LOCALES_DIR" ]; then
              find "$LOCALES_DIR" -name "*.pak" ! -name "en-US.pak" ! -name "en-GB.pak" -delete 2>/dev/null || true
            fi

            # Remove unused Qt plugins
            PLUGINS_DIR="$APP_DIR/Contents/Frameworks/PySide6/Qt/plugins"
            if [ -d "$PLUGINS_DIR" ]; then
              rm -rf "$PLUGINS_DIR/sqldrivers" 2>/dev/null || true
              rm -rf "$PLUGINS_DIR/virtualkeyboard" 2>/dev/null || true
              rm -rf "$PLUGINS_DIR/position" 2>/dev/null || true
              rm -rf "$PLUGINS_DIR/sensors" 2>/dev/null || true
              rm -rf "$PLUGINS_DIR/texttospeech" 2>/dev/null || true
              rm -rf "$PLUGINS_DIR/multimedia" 2>/dev/null || true
              rm -rf "$PLUGINS_DIR/qmltooling" 2>/dev/null || true
            fi

            # Re-sign after modifications
            codesign --force --deep --sign - "$APP_DIR" 2>/dev/null || true
          else
            echo "WARNING: paragraphulator.app not found"
          fi

      - name: Zip app bundle
        working-directory: building
        run: |
          APP_PATH=$(find . -name "paragraphulator.app" -maxdepth 3 -type d | head -1)
          echo "Found app at: $APP_PATH"
          APP_DIR=$(dirname "$APP_PATH")
          cd "$APP_DIR"
          zip -r "$GITHUB_WORKSPACE/paragraphulator-macos.zip" paragraphulator.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: paragraphulator-macos
          path: paragraphulator-macos.zip

  create-release:
    name: Create Release
    needs:
      - build-graphulator-windows
      - build-graphulator-macos
      - build-paragraphulator-windows
      - build-paragraphulator-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/graphulator-windows/graphulator-windows.zip
            artifacts/graphulator-macos/graphulator-macos.zip
            artifacts/paragraphulator-windows/paragraphulator-windows.zip
            artifacts/paragraphulator-macos/paragraphulator-macos.zip
