name: Bump Version
on:
  workflow_dispatch:
    inputs:
      level:
        description: 'Semver bump level'
        required: true
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bump version
        id: bump
        run: |
          NEW=$(python scripts/bump_version.py ${{ inputs.level }})
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pyproject.toml src/graphulator/__init__.py CHANGELOG.md
          git commit -m "Bump version to v${{ steps.bump.outputs.new }}"
          git tag "v${{ steps.bump.outputs.new }}"
          git push origin HEAD --follow-tags
